name: Service CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  ci:
    uses: Kubernetes-Incident-Manager/Kubernetes-Tracker/.github/workflows/reusable-ci.yml@main
    with:
      image_name: "worker-service"
    secrets: inherit
